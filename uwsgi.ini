[uwsgi]
module = app.app:app

master = true
processes = 4
threads = 2

http = 0.0.0.0:80

die-on-term = true
vacuum = true

# Exit non-zero if the app fails to import (e.g. required env vars missing)
# instead of silently entering "dynamic mode" with no app loaded.
need-app = true

# 8KB request buffer. Default 4KB silently drops requests with the
# full 500-id `watched` param. The app rejects anything bigger with
# a clean 400 (see /api/video/next).
buffer-size = 8192

# Removed static-map so Flask handles static files and provides correct MIME types.
