services:
  web:
    build: .
    ports:
      - "80:80"
    volumes:
      - ./funny/videos:/app/videos
      - ./funny/queue:/app/queue
      - ./funny/instance:/app/instance
    environment:
      - FLASK_ENV=production
      - ADMIN_USERNAME=admin
      # dev-only hash for the password "CHANGETHISPASSWORDNOW".
      # generate a fresh hash for production:
      #   python -c "from werkzeug.security import generate_password_hash; import getpass; print(generate_password_hash(getpass.getpass()))"
      # NOTE: literal `$` in compose env values must be escaped as `$$`
      - ADMIN_PASSWORD_HASH=scrypt:32768:8:1$$ssfodVrYovb9qlZ3$$2198e3b54ef73723e67a75a60679912fb94ae6da4858a29a6dabfdcb5553f8f3d62f4ef8ae08a55a74e95760c3a7e4a8b7fdebcfca12ef9cece0e54adec196d8
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    # on-failure (vs unless-stopped) so a hard config error like a missing
    # ADMIN_PASSWORD_HASH stops the container after a few retries instead
    # of looping forever
    restart: on-failure:3

  redis:
    image: redis:8.8.0-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    restart: on-failure:3
